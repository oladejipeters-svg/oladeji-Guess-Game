<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guessing Game</title>
    <link rel="stylesheet" href="./index.css" />
  </head>

  <body>
    <p class="charis">&lt; &lt; CharisIntelligence Project! &gt; &gt;</p>

    <h1>Guess the Number (1–100)</h1>

    <form id="form">
      <input
        type="number"
        id="userInput"
        min="1"
        max="100"
        placeholder="Enter a number"
      />
      <br /><br />
      <button type="submit" id="playBtn">Play</button>
    </form>

    <div class="container">
      <div id="userSquare" class="square">?</div>
      <div id="randomSquare" class="square">?</div>
    </div>

    <p id="message"></p>

    <script src="./index.js"></script>
  </body>
</html>
